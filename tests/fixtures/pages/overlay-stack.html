<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Overlay Stack Fixture</title>
    <style>
      .wrap {
        position: relative;
        width: 300px;
        height: 200px;
      }
      .overlay {
        position: absolute;
        inset: 0;
        background: transparent;
        z-index: 2;
      }
      img {
        width: 300px;
        height: 200px;
      }
    </style>
  </head>
  <body>
    <div class="wrap" id="target">
      <img
        src="https://example.com/fixtures/hidden-under-overlay.jpg"
        alt="hidden"
        data-testid="hidden-img"
      />
      <div class="overlay" data-testid="overlay"></div>
    </div>
  </body>
</html>
